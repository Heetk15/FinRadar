---
- name: Deploy FinRadar Stack
  hosts: all
  gather_facts: false
  vars:
    deploy_path: "{{ deploy_path | default('/opt/FinRadar') }}"

  tasks:
    - name: Ensure deployment repository exists on target host
      ansible.builtin.stat:
        path: "{{ deploy_path }}/docker-compose.yml"
      register: compose_file

    - name: Stop if docker-compose.yml is missing on target host
      ansible.builtin.fail:
        msg: "{{ deploy_path }}/docker-compose.yml does not exist on target host."
      when: not compose_file.stat.exists

    - name: Refresh containers using Docker Compose on target host
      ansible.builtin.shell: docker compose -f docker-compose.yml up -d --build --remove-orphans
      args:
        chdir: "{{ deploy_path }}"
